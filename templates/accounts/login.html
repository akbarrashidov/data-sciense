{% extends 'base.html' %}
{% block title %}Kirish — TechBlog{% endblock %}

{% block content %}
<style>
  .auth-footer-nav {
    text-align: center;
    margin-top: 20px;
    padding-top: 15px;
    border-top: 1px solid #eee;
  }
  .auth-footer-nav span {
    color: #666;
    font-size: 14px;
  }
  .link-reg {
    color: #764ba2; /* TechBlog binafsha rangi */
    text-decoration: none;
    font-weight: 600;
    font-size: 14px;
    margin-left: 5px;
    transition: color 0.2s;
  }
  .link-reg:hover {
    color: #5a3782;
    text-decoration: underline;
  }
  /* Xatolik xabari uchun qo'shimcha stil */
  .flash-inline.error {
    background: #fff1f0;
    border: 1px solid #ffa39e;
    color: #cf1322;
    padding: 10px;
    border-radius: 6px;
    margin-bottom: 15px;
    font-size: 14px;
  }
</style>

<div class="auth-page">
  <div class="auth-box">
    <div class="auth-logo-wrap">
      <div class="logo-mark">T</div>
      <h2>Xush kelibsiz</h2>
      <p>Hisobingizga kiring</p>
    </div>

    {% for message in messages %}
    <div class="flash-inline error">{{ message }}</div>
    {% endfor %}

    <form method="post" id="loginForm">
      {% csrf_token %}
      <div class="form-group">
        <label class="form-label">Username</label>
        <input type="text" name="username" class="form-input" placeholder="username" required autofocus>
      </div>
      <div class="form-group">
        <label class="form-label">Parol</label>
        <div class="input-with-icon">
          <input type="password" name="password" class="form-input" id="pwdInput" placeholder="••••••••" required>
          <button type="button" class="input-eye" id="pwdToggle">
            <svg id="eyeOpen" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            <svg id="eyeClosed" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
          </button>
        </div>
      </div>
      <button type="submit" class="btn-primary-full">Kirish</button>
    </form>

    <div class="auth-footer-nav">
      <span>Hisobingiz yo'qmi?</span>
      <a href="/registration/" class="link-reg">Ro'yxatdan o'tish</a>
    </div>
  </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
document.getElementById('pwdToggle').addEventListener('click', () => {
  const inp = document.getElementById('pwdInput');
  const open = document.getElementById('eyeOpen');
  const closed = document.getElementById('eyeClosed');
  if (inp.type === 'password') {
    inp.type = 'text';
    open.style.display = 'none';
    closed.style.display = 'block';
  } else {
    inp.type = 'password';
    open.style.display = 'block';
    closed.style.display = 'none';
  }
});
</script>
{% endblock %}
