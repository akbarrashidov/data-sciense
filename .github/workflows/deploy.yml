name: Deploy Data-Science.uz

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /var/www/www-root/data/www/data-science.uz
            git pull origin main
            sudo docker-compose up -d --build
            sudo docker-compose exec -T web_maqola python manage.py migrate --no-input
            sudo docker-compose exec -T web_maqola python manage.py collectstatic --no-input
            sudo chmod -R 755 staticfiles/
            sudo chmod -R 777 media/
            sudo systemctl restart nginx